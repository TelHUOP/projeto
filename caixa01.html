<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        
        h1 { /* box-level  se quizer pode transformar em inline-leve acrescentando o comando display: inline; no seletor desejado, Ex: h1*/
            background-color: pink;
            height: 300px;
            width: 300px;

            border: 10px solid black; 

            padding: 10px;
       
            
            margin: 20px auto 40px auto;

            outline: 5px dashed green;

        }
        a { /* inline-leve também posso mudar para box, acrescenta display: block;*/

            border: 10px solid red;



            padding: 10;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#" >links são exemplos de Caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
